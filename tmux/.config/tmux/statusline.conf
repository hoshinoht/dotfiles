# vim: ft=tmux
# Catppuccin Macchiato statusline

set -g mode-style "fg:#cad3f5,bg:#363a4f"

set -g message-style "fg:#f5a97f,bg:#363a4f"
set -g message-command-style "fg:#cad3f5,bg:#363a4f"

set -g pane-border-style "fg:#5b6078"
set -g pane-active-border-style "fg=#b7bdf8"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#8087a2,bg=#1e2030"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1e2030,bg=#c6a0f6,bold] #S #[fg=#c6a0f6,bg=#494d64,nobold,nounderscore,noitalics]#[fg=#cad3f5,bg=#494d64,bold] #(whoami) #[fg=#494d64,bg=#1e2030]"
set -g status-right "#[fg=#494d64,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#cad3f5,bg=#494d64] %Y-%m-%d #[fg=#8aadf4,bg=#494d64,nobold,nounderscore,noitalics]#[fg=#1e2030,bg=#8aadf4,bold] #h "

setw -g window-status-activity-style "underscore,fg=#a5adcb,bg=#1e2030"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a5adcb,bg=#1e2030"
setw -g window-status-format '#[fg=#1e2030,bg=#1e2030]#[default] #I  #{b:pane_current_path} #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1e2030,bg=#8aadf4]#[fg=#1e2030,bg=#8aadf4,bold] #I #[fg=#8aadf4,bg=#363a4f] #{b:pane_current_path} #[fg=#363a4f,bg=#1e2030,nobold]'
