# vim: ft=tmux
# ━━━ Dusk · Riced ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Pane Borders ──
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#75D6F6"
set -g pane-border-lines heavy

# ── Popups ──
set -g popup-border-style "fg=#75D6F6"
set -g popup-border-lines rounded

# ── Copy / Messages ──
set -g mode-style "fg=#cad3f5,bg=#494d64"
set -g message-style "fg=#181926,bg=#DDA05C,bold"
set -g message-command-style "fg=#cad3f5,bg=#363a4f"

# ── Status Bar ──
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-position bottom
set -g status-style "fg=#6e738d,bg=#181926"
set -g status-left-length 100
set -g status-right-length 100

# Left ─ session pill (pink)
set -g status-left "#[fg=#F3BDCA]#[fg=#181926,bg=#F3BDCA,bold]  #S #[bg=default,fg=#F3BDCA,nobold] "

# Right ─ date pill (surface) + time pill (sky) + user pill (pink)
set -g status-right "#[fg=#363a4f]#[fg=#B2B6C1,bg=#363a4f]  %a %d #[bg=default,fg=#363a4f,nobold]  #[fg=#75D6F6]#[fg=#181926,bg=#75D6F6,bold]  %H:%M #[bg=default,fg=#75D6F6,nobold]  #[fg=#F3BDCA]#[fg=#181926,bg=#F3BDCA,bold]  #(whoami) #[bg=default,fg=#F3BDCA,nobold]"

# ── Window Tabs ──
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-format "  #[fg=#6e738d]#I #[fg=#8087a2]#{b:pane_current_path} "
setw -g window-status-current-format " #[fg=#363a4f]#[fg=#cad3f5,bg=#363a4f,bold] #I #{b:pane_current_path}#{?window_zoomed_flag, 󰊓,} #[bg=default,fg=#363a4f,nobold]"

# ── Misc ──
set -g clock-mode-colour "#75D6F6"
set -g clock-mode-style 24
