; Dusk theme for fast-syntax-highlighting
; Palette based on Catppuccin Macchiato with Hoshino-inspired accents

[base]
default          = none
unknown-token    = #E27878,bold
commandseparator = #8F939F
redirection      = #75D6F6
here-string-tri  = #DEC47C
here-string-text = #B2B6C1
here-string-var  = #75D6F6,bg:#363a4f
exec-descriptor  = #DDA05C,bold
comment          = #6E7280
correct-subtle   = #75D6F6
incorrect-subtle = #E27878
subtle-separator = #82C8A0
subtle-bg        = bg:#363a4f
secondary        = free

[command-point]
reserved-word  = #C4A2D4
subcommand     = #C4A2D4
alias          = #82C8A0
suffix-alias   = #82C8A0
global-alias   = #82C8A0,bold
builtin        = #82C8A0
function       = #75D6F6
command        = #82C8A0
precommand     = #F3BDCA
hashed-command = #82C8A0
single-sq-bracket = #6EC4B8
double-sq-bracket = #6EC4B8
double-paren   = #DDA05C

[paths]
path          = #F3BDCA
pathseparator = #8F939F
path-to-dir   = #F3BDCA,underline
globbing      = #5CB8E4,bold
globbing-ext  = #B0BCE8

[brackets]
paired-bracket  = bg:#494d64
bracket-level-1 = #F3BDCA,bold
bracket-level-2 = #75D6F6,bold
bracket-level-3 = #DEC47C,bold

[arguments]
single-hyphen-option   = #B0BCE8
double-hyphen-option   = #B0BCE8
back-quoted-argument   = none
single-quoted-argument = #DEC47C
double-quoted-argument = #DEC47C
dollar-quoted-argument = #DDA05C

[in-string]
back-dollar-quoted-argument           = #6EC4B8
back-or-dollar-double-quoted-argument = #6EC4B8

[other]
variable             = #75D6F6
assign               = none
assign-array-bracket = #6EC4B8
history-expansion    = #5CB8E4,bold

[math]
mathvar = #5CB8E4,bold
mathnum = #C4A2D4
matherr = #E27878

[for-loop]
forvar  = #F3F5FC
fornum  = #C4A2D4
foroper = #DDA05C
forsep  = #DDA05C,bold

[case]
case-input       = #82C8A0
case-parentheses = #DDA05C
case-condition   = bg:#494d64
