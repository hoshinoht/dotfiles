format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
$git_metrics\
[](fg:surface1)\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$kubernetes\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "dusk"

[os]
disabled = false
style = "fg:text bg:surface0"

[os.symbols]
Macos = " "
Linux = " "
Windows = " "

[directory]
style = "fg:pink bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "蟀垯 "
"Downloads" = " "
"Music" = "蟀潥 "
"Pictures" = " "
"Developer" = "蟀矉 "
"projects" = "蟀矉 "

[git_branch]
symbol = " "
style = "fg:text bg:surface1"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:text bg:surface1"
format = "[$all_status$ahead_behind]($style)"

[git_metrics]
disabled = false
added_style = "fg:green bg:surface1"
deleted_style = "fg:red bg:surface1"
format = "[+$added](fg:green bg:surface1)[/](fg:overlay1 bg:surface1)[-$deleted](fg:red bg:surface1)[ ](bg:surface1)"

[nodejs]
symbol = " "
style = "fg:green"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "fg:yellow"
format = "[ $symbol$version ]($style)"

[rust]
symbol = "蟊槜 "
style = "fg:peach"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "fg:blue"
format = "[ $symbol$version ]($style)"

[docker_context]
symbol = " "
style = "fg:sapphire"
format = "[ $symbol$context ]($style)"

[kubernetes]
disabled = false
symbol = "蟊兙 "
style = "fg:lavender"
format = "[ $symbol$context ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 2_000
style = "fg:subtext0"
format = "[ 蟊帿 $duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:subtext0"
format = "[ $time ]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[鉂痌(green)"
error_symbol = "[鉂痌(red)"
vimcmd_symbol = "[鉂甝(mauve)"

[palettes.dusk]
